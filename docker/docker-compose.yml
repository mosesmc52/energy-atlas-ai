services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      chainlit:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: energy_atlas
      POSTGRES_USER: energy_atlas
      POSTGRES_PASSWORD: energy_atlas
    ports:
      - "5432:5432"
    volumes:
      - ../docker_volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_atlas -d energy_atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ..
      dockerfile: docker/Dockerfile.django
    env_file:
      - ../.env
    command: >
      sh -c "poetry run python app/manage.py migrate &&
      poetry run python app/manage.py runserver 0.0.0.0:8000"
    working_dir: /workspace
    environment:
      DJANGO_SETTINGS_MODULE: main.settings
      DJANGO_CONFIGURATION: Development
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: "postgres://energy_atlas:energy_atlas@postgres:5432/energy_atlas"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    env_file:
      - ../.env
    working_dir: /workspace
    environment:
      DJANGO_SETTINGS_MODULE: main.settings
      DJANGO_CONFIGURATION: Development
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: "postgres://energy_atlas:energy_atlas@postgres:5432/energy_atlas"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ..:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  chainlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.chainlit
    env_file:
      - ../.env
    command: poetry run chainlit run chainlit/app.py --host 0.0.0.0 --port 8001
    working_dir: /workspace
    environment:
      PYTHONUNBUFFERED: "1"
      CHAINLIT_HOST: "0.0.0.0"
      CHAINLIT_PORT: "8001"
    expose:
      - "8001"
    volumes:
      - ..:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      django:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
