services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ../.env
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in the production env file}
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - static_data:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      chainlit:
        condition: service_started
      django:
        condition: service_started

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-energy_atlas}
      POSTGRES_USER: ${POSTGRES_USER:-energy_atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-energy_atlas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-energy_atlas} -d ${POSTGRES_DB:-energy_atlas}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ..
      dockerfile: docker/Dockerfile.django.production
    env_file:
      - ../.env
    working_dir: /workspace
    environment:
      DJANGO_SETTINGS_MODULE: main.settings
      DJANGO_CONFIGURATION: Production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in the production env file}
      DATABASE_URL: ${DATABASE_URL:-postgres://energy_atlas:energy_atlas@postgres:5432/energy_atlas}
      DJANGO_STATIC_ROOT: /workspace/app/staticfiles
      PYTHONUNBUFFERED: "1"
    volumes:
      - static_data:/workspace/app/staticfiles
      - app_data:/workspace/data
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    env_file:
      - ../.env
    working_dir: /workspace
    environment:
      DJANGO_SETTINGS_MODULE: main.settings
      DJANGO_CONFIGURATION: Production
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in the production env file}
      DATABASE_URL: ${DATABASE_URL:-postgres://energy_atlas:energy_atlas@postgres:5432/energy_atlas}
      PYTHONUNBUFFERED: "1"
    volumes:
      - app_data:/workspace/data
    depends_on:
      postgres:
        condition: service_healthy

  chainlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.chainlit
    env_file:
      - ../.env
    command: poetry run chainlit run chainlit/app.py --host 0.0.0.0 --port 8001
    working_dir: /workspace
    environment:
      DJANGO_SETTINGS_MODULE: main.settings
      DJANGO_CONFIGURATION: Production
      PYTHONUNBUFFERED: "1"
      CHAINLIT_HOST: "0.0.0.0"
      CHAINLIT_PORT: "8001"
    volumes:
      - app_data:/workspace/data
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
      django:
        condition: service_started

volumes:
  postgres_data:
  static_data:
  app_data:
  caddy_data:
  caddy_config:
