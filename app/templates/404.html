{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block page-content %}
  <section class="mx-auto max-w-3xl">
    <div class="panel p-8 sm:p-10 text-center space-y-4">
      <p class="eyebrow">404 Error</p>
      <h1 class="text-3xl sm:text-4xl font-semibold tracking-tight text-slate-900">Page Not Found</h1>
      <p class="text-base leading-7 text-slate-600">
        The page you requested could not be found. It may have moved or no longer exists.
      </p>
      <div class="pt-2">
        <a href="{% url 'alerts:list' %}" class="btn-secondary px-4 py-2.5 text-sm font-semibold">Go to Alerts</a>
      </div>
    </div>
  </section>
{% endblock %}
