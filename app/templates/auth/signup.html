{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block page-content %}
  <section class="mx-auto max-w-md panel form-stack">
    <div class="space-y-2">
      <p class="eyebrow">Authentication</p>
      <h2 class="text-3xl font-semibold tracking-tight text-white">Create account</h2>
      <p class="text-sm text-slate-300">Set up access to the alert dashboard and sandbox tools.</p>
    </div>

    <form method="post" action="{% url 'auth:signup' %}" class="form-stack">
      {% csrf_token %}

      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" value="{{ request.POST.email|default:'' }}" required>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>
      </div>

      <div class="field-group">
        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" type="password" name="confirm_password" required>
      </div>

      <button class="btn-primary w-full" type="submit">Create account</button>
    </form>

    <p class="text-sm text-slate-300">Already have an account? <a class="text-atlas-100 hover:text-white" href="{% url 'auth:signin' %}">Sign in</a></p>
  </section>
{% endblock %}
