<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In</title>
</head>
<body>
  <main>
    <h1>Sign in</h1>

    {% if messages %}
      <ul>
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <form method="post" action="{% url 'auth:signin' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <label for="email">Email</label>
      <input id="email" type="email" name="email" value="{{ request.POST.email|default:'' }}" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" required>

      <label for="remember-me">
        <input id="remember-me" type="checkbox" name="remember_me">
        Remember me
      </label>

      <button type="submit">Sign in</button>
    </form>

    <p><a href="{% url 'auth:forgot' %}">Forgot password?</a></p>
    <p>Need an account? <a href="{% url 'auth:signup' %}">Sign up</a></p>
  </main>
</body>
</html>
