{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block page-content %}
  <section class="mx-auto max-w-md panel form-stack">
    <div class="space-y-2">
      <p class="eyebrow">Recovery</p>
      <h2 class="text-3xl font-semibold tracking-tight text-white">Reset password</h2>
      <p class="text-sm text-slate-300">Enter your email and the app will send reset instructions if the account exists.</p>
    </div>

    <form method="post" action="{% url 'auth:forgot' %}" class="form-stack">
      {% csrf_token %}

      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" value="{{ request.POST.email|default:'' }}" required>
      </div>

      <button class="btn-primary w-full" type="submit">Send reset instructions</button>
    </form>

    <p class="text-sm text-slate-300"><a class="text-atlas-100 hover:text-white" href="{% url 'auth:signin' %}">Back to sign in</a></p>
  </section>
{% endblock %}
