{% load static %}
<header class="border-b border-white/10 bg-white/80 backdrop-blur">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-6 px-4 py-4 sm:px-6 lg:px-8">
    <a href="{% if request.user.is_authenticated %}{% url 'alerts:list' %}{% else %}{% url 'root' %}{% endif %}" class="flex items-center gap-4">
      <img src="{% static 'img/logo-w-title.png' %}" alt="Energy Atlas" class="h-12 w-auto">
    </a>

    <div class="flex items-center gap-3">
      {% if request.user.is_authenticated and has_active_subscription %}
        <a href="{% url 'billing:manage' %}" class="btn-secondary px-4 py-2 text-sm font-semibold">
          Manage Subscription
        </a>
      {% else %}
        <a href="{% url 'pricing' %}" class="btn-secondary px-4 py-2 text-sm font-semibold">
          {% if request.user.is_authenticated %}Upgrade{% else %}Pricing{% endif %}
        </a>
      {% endif %}
      {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'auth:logout' %}">
          {% csrf_token %}
          <button class="btn-secondary px-4 py-2 text-sm font-semibold" type="submit">Log out</button>
        </form>
      {% else %}
        <a href="{% url 'auth:signin' %}" class="btn-black px-4 py-2 text-sm font-semibold">Sign in</a>
      {% endif %}
    </div>
  </div>
</header>
